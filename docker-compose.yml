services:
  duo2api:
    build:
      context: .
      args:
        DUO2API_COMMIT: ${DUO2API_COMMIT:-unknown}
        DUO2API_BRANCH: ${DUO2API_BRANCH:-main}
    container_name: duo2api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/app/config.json
    environment:
      PYTHONUNBUFFERED: "1"
